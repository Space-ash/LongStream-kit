# LongStream 重建模板：Optimized
# 用途：
# - 打开输入预筛选和 GT 周期校正
# - 作为推荐主实验配置

device: cuda

model:
  checkpoint: checkpoints/50_longstream.pt
  strict_load: false
  hf:
    repo_id: null
    filename: null
    revision: null
    local_dir: checkpoints
  longstream_cfg:
    img_size: 518
    patch_size: 14
    embed_dim: 1024
    window_size: 48
    use_role_embedding: false
    enable_scale_token: true
    disable_keyframe_distinction: true
    use_segment_mask: false
    enable_camera_head: false
    use_rel_pose_head: true
    freeze: none
    rel_pose_head_cfg:
      enabled: true
      keyframe_mode: fixed
      keyframe_stride: 8
      reference_source: pred
      detach_reference: false
      trunk_depth: 4
      pose_mode: SE3
      num_heads: 16
      mlp_ratio: 4
      init_values: 0.01
      trans_act: linear
      quat_act: linear
      use_pair_cross_attn: false
      xattn_temperature: 1.0
      use_precat: false
      use_kf_role_embed: false
      kf_role_embed_init_std: 0.02
      fl_act: relu
      use_global_scale: false
      reinit_camera_head: false

inference:
  mode: batch_refresh
  streaming_mode: causal
  window_size: 48
  keyframe_mode: fixed
  keyframe_stride: 8
  refresh: 4
  rel_pose_head_cfg:
    num_iterations: 4

data:
  format: generalizable
  data_roots_file: data_roots.txt
  img_path: prepared_inputs/vkitti2
  seq_list: [Scene01/clone]
  camera: "00"
  stride: 1
  max_frames: null
  size: 518
  crop: false
  patch_size: 14
  gt_source: auto
  gt_poses_file: gt_poses.npy

optimizations:
  filter:
    frame_filter_enabled: false
    confidence_filter_enabled: true
    blur_threshold: 100.0
    motion_threshold: 0.02
    confidence_threshold: 0.5
    save_frame_index_map: false
  correction:
    tto_enabled: true
    tto_steps: 20
    tto_lr: 1.0e-3
    tto_weight_decay: 0.0
    tto_window_size: 40
    tto_min_gps_disp: 1.0
    tto_max_grad_norm: 1.0
    tto_pair_stride: 8

output:
  root: outputs/vkitti2_scene01_clone/optimized
  save_videos: false
  save_images: true
  save_depth: true
  save_points: true
  save_frame_points: false
  save_point_head: false
  save_dpt_unproj: true
  rerun_current_points: 8000
  rerun_global_points: 30000
  # rerun_global_ingest_points 已废弃（独立 viewer reservoir 已删除，viewer 直接采样 dpt_unproj 全局 reservoir）
  rerun_view_coordinates: RIGHT_HAND_Z_UP  # 可选 RIGHT_HAND_Y_UP
  live_global_checkpoint_interval: 0
  torch_num_threads: 2
  opencv_num_threads: 1
  enable_sky_mask: true      # 启用 sky segmentation 过滤点云中的天空区域
  save_sky_mask: false        # 是否将天空遮罩 mask PNG 写入磁盘（不影响过滤）
  skyseg_path: model/skyseg.onnx
  skyseg_num_threads: 1       # onnxruntime skyseg 线程数，控制 CPU 占用
  save_depth_vis: false       # 是否生成深度伪彩色 PNG（save_depth=true 时生效）
  global_compact_pending_points: 800000  # reservoir compact 触发默认 800k（降低周期性 CPU 尖峰）
  max_full_pointcloud_points: 2000000
  max_frame_pointcloud_points: 200000

evaluation:
  align_scale: true
  depth_rel_delta_threshold: 1.25
  point_f1_threshold: 0.25
  point_eval_max_points: 100000
  point_eval_voxel_size: null
  point_eval_oversample_factor: 4

monitoring:
  enabled: false             # 设为 true 启动后台资源采样（需要 psutil）
  interval_sec: 2.0
  top_process_count: 10
  write_process_top: true    # cpu_process_top.csv（debug 用）
  write_cpu_timeseries: true # cpu_timeseries.csv（论文绘图用）
  write_gpu_timeseries: true # gpu_timeseries.csv（需要 nvidia-smi）
