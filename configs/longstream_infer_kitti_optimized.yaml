# LongStream 推理配置：KITTI Odometry Seq 05 (Optimized)
#
# 数据来源：KITTI Odometry sequence 05
# 预处理：bash prepare_kitti_odometry.sh
#
# 注意：
#   - 当前数据无 GT depth，depth/pointcloud GT 相关指标不可用
#   - 可用指标：ATE、位姿轨迹误差（pose/ATE 系列）
#
# Smoke test（前 100 帧快速验证）：
#   将 data.max_frames 设为 100，运行后查看 outputs/kitti_odometry_05/optimized/

device: cuda

model:
  checkpoint: checkpoints/50_longstream.pt
  strict_load: false
  hf:
    repo_id: null
    filename: null
    revision: null
    local_dir: checkpoints
  longstream_cfg:
    img_size: 518
    patch_size: 14
    embed_dim: 1024
    window_size: 48
    use_role_embedding: false
    enable_scale_token: true
    disable_keyframe_distinction: true
    use_segment_mask: false
    enable_camera_head: false
    use_rel_pose_head: true
    freeze: none
    rel_pose_head_cfg:
      enabled: true
      keyframe_mode: fixed
      keyframe_stride: 8
      reference_source: pred
      detach_reference: false
      trunk_depth: 4
      pose_mode: SE3
      num_heads: 16
      mlp_ratio: 4
      init_values: 0.01
      trans_act: linear
      quat_act: linear
      use_pair_cross_attn: false
      xattn_temperature: 1.0
      use_precat: false
      use_kf_role_embed: false
      kf_role_embed_init_std: 0.02
      fl_act: relu
      use_global_scale: false
      reinit_camera_head: false

inference:
  mode: batch_refresh
  streaming_mode: causal
  window_size: 48
  keyframe_mode: fixed
  keyframe_stride: 8
  refresh: 4
  rel_pose_head_cfg:
    num_iterations: 4

data:
  format: generalizable
  data_roots_file: data_roots.txt
  img_path: prepared_inputs/kitti_odometry
  seq_list: ["05"]       # 选择场景
  camera: "02"
  stride: 1
  max_frames: 200        # 改为 100 可进行 smoke test, null 则处理全部帧
  size: 518
  crop: false
  patch_size: 14
  gt_source: auto
  gt_poses_file: gt_poses.npy
  depth_gt_type: auto   # auto: 自动读取 depth_meta.json；无文件时当 dense（vKITTI2 兼容）

optimizations:
  filter:
    frame_filter_enabled: false
    confidence_filter_enabled: true
    blur_threshold: 100.0
    motion_threshold: 0.02
    confidence_threshold: 0.5
    save_frame_index_map: false
  correction:
    tto_enabled: true
    tto_steps: 20
    tto_lr: 1.0e-3
    tto_weight_decay: 0.0
    tto_window_size: 40
    tto_min_gps_disp: 1.0
    tto_max_grad_norm: 1.0
    tto_pair_stride: 8

output:
  root: outputs/kitti_odometry_05/optimized
  save_videos: false
  save_images: false
  save_depth: true
  save_points: true
  save_frame_points: false
  save_point_head: false
  save_dpt_unproj: true
  enable_sky_mask: true
  save_sky_mask: false
  skyseg_path: model/skyseg.onnx
  skyseg_num_threads: 1

  # SkySeg advanced runtime controls
  skyseg_provider: auto          # auto | cuda | cpu
  skyseg_cuda_min_free_gb: 4.0   # auto 模式下空闲显存低于该值则回退 CPU

  skyseg_reuse_enabled: true
  skyseg_stride: 4               # 每 N 帧实际运行一次 skyseg
  skyseg_run_on_keyframes: true  # 关键帧强制刷新 mask
  skyseg_max_stale_frames: 8     # 复用 mask 的最大帧距

  skyseg_cache_enabled: true
  skyseg_cache_dir: null         # null => <out_dir>/sky_masks_cache
  save_depth_vis: false
  global_compact_pending_points: 800000
  max_full_pointcloud_points: 2000000
  max_frame_pointcloud_points: 200000
  rerun_current_points: null    # null = 不限制当前帧推送点数
  rerun_global_points: 30000
  # rerun_global_ingest_points 已废弃（独立 viewer reservoir 已删除）
  rerun_current_centered: true  # 当前帧点云居中到相机中心，防止世界坐标漂出调试视野
  rerun_use_blueprint: true
  rerun_view_coordinates: RIGHT_HAND_Y_DOWN
  live_global_checkpoint_interval: 0
  torch_num_threads: 2
  opencv_num_threads: 1
  timing_log_interval: 0     # 0=关闭 timing 日志；设为正整数 N 则每 N 帧打印一次
  vram_log_enabled: false    # 是否每 25 帧打印 VRAM 快照

evaluation:
  align_scale: false
  depth_rel_delta_threshold: 1.25
  point_f1_threshold: 0.25
  point_eval_max_points: 100000
  point_eval_voxel_size: null
  point_eval_oversample_factor: 4
  # 稀疏 LiDAR GT 策略：仅计算 GT->pred 推断 recall，不计算对称 Chamfer/F1
  sparse_depth_pointcloud_policy: recall_only
  # true 时复用对称 Chamfer/F1 并写入 warning（不建议）
  allow_sparse_chamfer_f1: false
  # 少于此像素数时跳过深度指标
  min_valid_depth_pixels: 1

monitoring:
  enabled: true
  interval_sec: 2.0
  top_process_count: 10
  write_process_top: true
  write_cpu_timeseries: true
  write_gpu_timeseries: true
