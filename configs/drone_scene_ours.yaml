# drone_scene 测试配置
# 用途：对无人机场景数据（drone_scene）进行重建+轨迹校正。
# 数据预处理：python scripts/drone_scene_to_generalizable.py
#   (默认输出到 prepared_inputs/drone_scene/)
# 运行方式：python infer.py --config configs/drone_scene_ours.yaml

device: cuda

model:
  checkpoint: checkpoints/50_longstream.pt
  strict_load: false
  hf:
    repo_id: null
    filename: null
    revision: null
    local_dir: checkpoints
  longstream_cfg:
    img_size: 518
    patch_size: 14
    embed_dim: 1024
    window_size: 48
    use_role_embedding: false
    enable_scale_token: true
    disable_keyframe_distinction: true
    use_segment_mask: false
    enable_camera_head: false
    use_rel_pose_head: true
    freeze: none
    rel_pose_head_cfg:
      enabled: true
      keyframe_mode: fixed
      keyframe_stride: 8
      reference_source: pred
      detach_reference: false
      trunk_depth: 4
      pose_mode: SE3
      num_heads: 16
      mlp_ratio: 4
      init_values: 0.01
      trans_act: linear
      quat_act: linear
      use_pair_cross_attn: false
      xattn_temperature: 1.0
      use_precat: false
      use_kf_role_embed: false
      kf_role_embed_init_std: 0.02
      fl_act: relu
      use_global_scale: false
      reinit_camera_head: false

inference:
  mode: batch_refresh
  streaming_mode: causal
  window_size: 48
  keyframe_mode: fixed
  keyframe_stride: 8
  refresh: 4
  rel_pose_head_cfg:
    num_iterations: 4

data:
  format: generalizable
  data_roots_file: data_roots.txt
  img_path: prepared_inputs/drone_scene
  seq_list: ["drone_scene"]
  camera: "00"
  stride: 1
  frame_start: null          # 0-based 闭区间起始帧，null 表示从头
  frame_end: null            # 0-based 闭区间结束帧，null 表示到末尾
  max_frames: null           # null = 全量；可改为整数限制帧数
  size: 518
  crop: false
  patch_size: 14
  gt_source: auto            # 自动检测 gps_xyz.npy；无 GT 深度/位姿
  gt_poses_file: null        # 无相机位姿真值
  depth_gt_type: none        # 无深度真值

optimizations:
  filter:
    frame_filter_enabled: false
    confidence_filter_enabled: true
    blur_threshold: 100.0
    motion_threshold: 0.02
    confidence_threshold: 0.5
    save_frame_index_map: false
  correction:
    tto_enabled: true
    tto_steps: 20
    tto_lr: 1.0e-3
    tto_weight_decay: 0.0
    tto_window_size: 20
    tto_min_gps_disp: 1.0
    tto_max_grad_norm: 1.0
    tto_pair_stride: 8
    tto_pair_strides: [4, 8, 16]
    tto_sampling: deterministic_coverage
    tto_lambda_dir: 0.1
    tto_lambda_endpoint: 0.2
    tto_early_stop_patience: 4
    tto_min_delta: 1.0e-3
    tto_batch_windows: 1
    tto_steps_initial: 12
    tto_steps_update: 4
    tto_update_interval_frames: 40
    tto_window_step: 40
  pose_post_correction:
    enabled: true
    method: segment_se3
    source: gps
    segment_size: 120
    overlap: 40
    min_points: 8
    blend: hann
    use_for_point_export: true
    save_raw_pose: true
    corrected_pose_name: abs_pose_corrected.txt
    gps_filter:
      enabled: false
      method: none
      median_kernel: 5
      savgol_window: 21
      savgol_polyorder: 2
      moving_average_window: 9
      max_step_m: null
      kalman_process_noise: 1.0
      kalman_measurement_noise: 4.0
      kalman_dt: 1.0

output:
  root: outputs/drone_scene/drone_scene
  save_videos: false
  save_images: false
  save_depth: true
  save_points: true
  save_frame_points: true
  save_point_head: false
  save_dpt_unproj: true
  enable_sky_mask: true
  save_sky_mask: false
  skyseg_path: model/skyseg.onnx
  skyseg_num_threads: 1
  skyseg_provider: auto
  skyseg_cuda_min_free_gb: 4.0
  skyseg_reuse_enabled: false
  skyseg_stride: 4
  skyseg_run_on_keyframes: true
  skyseg_max_stale_frames: 8
  skyseg_cache_enabled: true
  skyseg_cache_dir: null
  save_depth_vis: false
  global_compact_pending_points: 800000
  max_full_pointcloud_points: 2000000
  max_frame_pointcloud_points: 200000
  rerun_current_points: null
  rerun_global_points: 30000
  rerun_current_centered: true
  rerun_use_blueprint: true
  rerun_view_coordinates: RIGHT_HAND_Y_DOWN
  live_global_checkpoint_interval: 0
  torch_num_threads: 2
  opencv_num_threads: 1
  timing_log_interval: 0
  vram_log_enabled: false

monitoring:
  enabled: true
  interval_sec: 2.0
  top_process_count: 10
  write_process_top: true
  write_cpu_timeseries: true
  write_gpu_timeseries: true
